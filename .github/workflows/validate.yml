# .github/workflows/validate.yml
name: Validate Targets

on:
  push:
    paths:
      - "targets.yaml"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/validate.yml"
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Biar run CI makin ngebut

      - name: Install dependencies
        # Install sebagai editable package beserta dev dependencies
        run: pip install -e .[dev]

      - name: Validate targets.yaml
        run: python scripts/validate_targets.py

      - name: Run Unit Tests (Enrichers)
        run: pytest tests/ -v
